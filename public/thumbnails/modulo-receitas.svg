<svg xmlns="http://www.w3.org/2000/svg" width="600" height="450" viewBox="0 0 600 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d4e8f0"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b8d8e8;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#c8e0f0;stop-opacity:0.4"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c45fa0"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="600" height="450" fill="url(#bg)"/>
  <path d="M400 0 Q500 30 600 10 L600 0 Z" fill="url(#wave)"/>
  <path d="M350 0 Q480 50 600 25 L600 0 Q500 30 400 0Z" fill="url(#wave)" opacity="0.5"/>
  <path d="M0 380 Q150 350 300 390 Q450 430 600 400 L600 450 L0 450 Z" fill="url(#wave)" opacity="0.5"/>

  <!-- Card 1 — stack of books/PDFs -->
  <g transform="translate(18, 18)">
    <rect width="270" height="200" rx="14" fill="#dde8f5" opacity="0.6"/>
    <!-- PDF stack -->
    <rect x="40" y="130" width="190" height="14" rx="4" fill="#a0b8d0" opacity="0.6"/>
    <rect x="45" y="110" width="180" height="25" rx="6" fill="#b8cce0" opacity="0.65"/>
    <rect x="50" y="85" width="170" height="30" rx="7" fill="#c8d8ec" opacity="0.7"/>
    <rect x="55" y="55" width="160" height="35" rx="8" fill="#d8e8f8" opacity="0.75"/>
    <line x1="75" y1="68" x2="195" y2="68" stroke="#8090a0" stroke-width="2" opacity="0.5"/>
    <line x1="75" y1="78" x2="170" y2="78" stroke="#8090a0" stroke-width="1.5" opacity="0.4"/>
    <text x="135" y="178" font-family="Arial, sans-serif" font-size="28" font-weight="900" fill="#4a6a8a" opacity="0.7" text-anchor="middle">2000+</text>
  </g>

  <!-- Card 2 — top right -->
  <g transform="translate(300, 18)">
    <rect width="282" height="95" rx="14" fill="#e8e0f5" opacity="0.6"/>
    <!-- Pattern grid -->
    <g opacity="0.4" stroke="#7060a0" stroke-width="2" fill="none">
      <rect x="20" y="15" width="55" height="65" rx="5"/>
      <rect x="85" y="15" width="55" height="65" rx="5"/>
      <rect x="150" y="15" width="55" height="65" rx="5"/>
      <rect x="215" y="15" width="50" height="65" rx="5"/>
    </g>
    <text x="141" y="82" font-family="Arial, sans-serif" font-size="12" fill="#5040a0" text-anchor="middle" font-weight="600">Modelos em PDF</text>
  </g>

  <!-- Card 3 — mid right -->
  <g transform="translate(300, 125)">
    <rect width="282" height="93" rx="14" fill="#f0e8d8" opacity="0.6"/>
    <!-- Yarn/color swatches -->
    <circle cx="55" cy="47" r="28" fill="#e8a040" opacity="0.4"/>
    <circle cx="115" cy="47" r="28" fill="#e06080" opacity="0.4"/>
    <circle cx="175" cy="47" r="28" fill="#60a0e0" opacity="0.4"/>
    <circle cx="235" cy="47" r="28" fill="#80c080" opacity="0.4"/>
    <text x="141" y="83" font-family="Arial, sans-serif" font-size="12" fill="#7a5020" text-anchor="middle" font-weight="600">Receitas por Nível</text>
  </g>

  <!-- Card 4 — bottom left -->
  <g transform="translate(18, 230)">
    <rect width="180" height="175" rx="14" fill="#d8f0e0" opacity="0.6"/>
    <!-- Checkmarks -->
    <text x="30" y="75" font-family="Arial" font-size="18" fill="#30a050" opacity="0.6">✓ Iniciante</text>
    <text x="30" y="105" font-family="Arial" font-size="18" fill="#30a050" opacity="0.6">✓ Médio</text>
    <text x="30" y="135" font-family="Arial" font-size="18" fill="#30a050" opacity="0.6">✓ Avançado</text>
    <text x="90" y="162" font-family="Arial, sans-serif" font-size="12" fill="#20703a" text-anchor="middle" font-weight="600">Todos os Níveis</text>
  </g>

  <!-- Card 5 — bottom center-right -->
  <g transform="translate(210, 230)">
    <rect width="372" height="175" rx="14" fill="#f5e8f0" opacity="0.6"/>
    <!-- Large number highlight -->
    <text x="186" y="120" font-family="Georgia, serif" font-size="90" font-weight="900" fill="#c45fa0" opacity="0.18" text-anchor="middle">2000</text>
    <text x="186" y="100" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#8040a0" opacity="0.65" text-anchor="middle">Modelos &amp; Receitas</text>
    <text x="186" y="130" font-family="Arial, sans-serif" font-size="16" fill="#a060b0" opacity="0.6" text-anchor="middle">em PDF para baixar</text>
    <text x="186" y="158" font-family="Arial, sans-serif" font-size="13" fill="#c45fa0" text-anchor="middle" font-weight="600">Acesso Vitalício</text>
  </g>

  <rect x="0" y="420" width="600" height="30" fill="url(#accent)" opacity="0.85"/>
  <text x="300" y="440" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle" letter-spacing="2">+2000 MODELOS E RECEITAS · CROCHÊ DA JOSI</text>
</svg>
