<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1230"/>
      <stop offset="100%" style="stop-color:#2d1b4e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c45fa0"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e879b0;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.08"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <circle cx="680" cy="100" r="190" fill="url(#glow)"/>
  <circle cx="80" cy="380" r="130" fill="url(#glow)"/>
  <rect width="800" height="4" fill="url(#accent)"/>
  <!-- Bag silhouette -->
  <g transform="translate(460, 60)" opacity="0.20">
    <!-- Handle -->
    <path d="M60 60 Q60 20 110 20 Q160 20 160 60" stroke="#e879b0" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- Body -->
    <rect x="20" y="60" width="180" height="180" rx="20" stroke="#e879b0" stroke-width="4" fill="none"/>
    <!-- Crochet grid texture -->
    <line x1="20" y1="100" x2="200" y2="100" stroke="#c45fa0" stroke-width="2" opacity="0.7"/>
    <line x1="20" y1="140" x2="200" y2="140" stroke="#c45fa0" stroke-width="2" opacity="0.7"/>
    <line x1="20" y1="180" x2="200" y2="180" stroke="#c45fa0" stroke-width="2" opacity="0.7"/>
    <line x1="60" y1="60" x2="60" y2="240" stroke="#8b5cf6" stroke-width="2" opacity="0.6"/>
    <line x1="100" y1="60" x2="100" y2="240" stroke="#8b5cf6" stroke-width="2" opacity="0.6"/>
    <line x1="140" y1="60" x2="140" y2="240" stroke="#8b5cf6" stroke-width="2" opacity="0.6"/>
    <!-- Clasp -->
    <rect x="85" y="55" width="50" height="14" rx="7" stroke="#e879b0" stroke-width="3" fill="none"/>
  </g>
  <!-- Decorative diamonds -->
  <g opacity="0.15">
    <path d="M630 300 L650 270 L670 300 L650 330 Z" stroke="#e879b0" stroke-width="2" fill="none"/>
    <path d="M680 320 L693 302 L706 320 L693 338 Z" stroke="#c45fa0" stroke-width="2" fill="none"/>
  </g>
  <!-- Main label -->
  <rect x="60" y="160" width="6" height="110" rx="3" fill="url(#accent)"/>
  <text x="86" y="215" font-family="Georgia, serif" font-size="52" font-weight="700" fill="white">Bolsas</text>
  <text x="86" y="275" font-family="Georgia, serif" font-size="52" font-weight="700" fill="white">de Crochê</text>
  <text x="86" y="330" font-family="Georgia, serif" font-size="24" font-weight="400" fill="#e879b0">Bolsas, Carteiras &amp; Acessórios</text>
  <text x="86" y="395" font-family="Arial, sans-serif" font-size="18" fill="#c45fa0" letter-spacing="3">CROCHÊ DA JOSI</text>
</svg>
