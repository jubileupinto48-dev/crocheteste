<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <clipPath id="c1"><rect width="300" height="185" rx="0"/></clipPath>
    <clipPath id="c2"><rect width="300" height="185" rx="0"/></clipPath>
    <clipPath id="c3"><rect width="200" height="175" rx="0"/></clipPath>
    <clipPath id="c4"><rect width="200" height="175" rx="0"/></clipPath>
    <clipPath id="c5"><rect width="200" height="175" rx="0"/></clipPath>
    <linearGradient id="bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c45fa0"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Row 1: 2 photos -->
  <g transform="translate(0,0)" clip-path="url(#c1)">
    <image href="/thumbnails/hat-2463525.jpg" x="0" y="0" width="300" height="185" preserveAspectRatio="xMidYMid slice"/>
  </g>
  <g transform="translate(301,0)" clip-path="url(#c2)">
    <image href="/thumbnails/hat-732425.jpg" x="0" y="0" width="300" height="185" preserveAspectRatio="xMidYMid slice"/>
  </g>

  <!-- Row 2: 3 photos -->
  <g transform="translate(0,186)" clip-path="url(#c3)">
    <image href="/thumbnails/hat-11964380.jpg" x="0" y="0" width="200" height="175" preserveAspectRatio="xMidYMid slice"/>
  </g>
  <g transform="translate(201,186)" clip-path="url(#c4)">
    <image href="/thumbnails/hat-2976288.jpg" x="0" y="0" width="200" height="175" preserveAspectRatio="xMidYMid slice"/>
  </g>
  <g transform="translate(402,186)" clip-path="url(#c5)">
