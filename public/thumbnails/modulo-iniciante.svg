<svg xmlns="http://www.w3.org/2000/svg" width="600" height="450" viewBox="0 0 600 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d4e8f0"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b8d8e8;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#c8e0f0;stop-opacity:0.4"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c45fa0"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <clipPath id="r1"><rect width="130" height="130" rx="14"/></clipPath>
    <clipPath id="r2"><rect width="130" height="130" rx="14"/></clipPath>
    <clipPath id="r3"><rect width="130" height="200" rx="14"/></clipPath>
    <clipPath id="r4"><rect width="130" height="130" rx="14"/></clipPath>
    <clipPath id="r5"><rect width="130" height="130" rx="14"/></clipPath>
  </defs>
  <!-- Background -->
  <rect width="600" height="450" fill="url(#bg)"/>
  <!-- Wave decoration top-right -->
  <path d="M400 0 Q500 30 600 10 L600 0 Z" fill="url(#wave)"/>
  <path d="M350 0 Q480 50 600 25 L600 0 Q500 30 400 0Z" fill="url(#wave)" opacity="0.5"/>
  <!-- Wave decoration bottom-left -->
  <path d="M0 380 Q100 350 200 390 Q300 430 400 400 Q500 370 600 400 L600 450 L0 450 Z" fill="url(#wave)" opacity="0.5"/>

  <!-- Card slot 1 — top left -->
  <g transform="translate(18, 18)">
    <rect width="180" height="200" rx="14" fill="#c9dde8" opacity="0.5"/>
    <!-- Crochet hook icon -->
    <rect x="75" y="30" width="30" height="110" rx="15" fill="#8b9fb0" opacity="0.6"/>
    <ellipse cx="90" cy="155" rx="22" ry="14" fill="none" stroke="#8b9fb0" stroke-width="6" opacity="0.6"/>
    <!-- label -->
    <text x="90" y="185" font-family="Arial, sans-serif" font-size="12" fill="#5a7a8a" text-anchor="middle" font-weight="600">Técnicas</text>
  </g>

  <!-- Card slot 2 — top center -->
  <g transform="translate(210, 18)">
    <rect width="180" height="200" rx="14" fill="#d4c5e0" opacity="0.5"/>
    <!-- Yarn ball icon -->
    <circle cx="90" cy="90" r="55" fill="none" stroke="#9b7fba" stroke-width="5" opacity="0.5"/>
    <path d="M40 70 Q90 50 140 70" stroke="#9b7fba" stroke-width="4" fill="none" opacity="0.6"/>
    <path d="M35 90 Q90 75 145 90" stroke="#9b7fba" stroke-width="4" fill="none" opacity="0.6"/>
    <path d="M40 110 Q90 100 140 110" stroke="#9b7fba" stroke-width="4" fill="none" opacity="0.6"/>
    <path d="M50 130 Q90 125 130 130" stroke="#9b7fba" stroke-width="4" fill="none" opacity="0.5"/>
    <text x="90" y="183" font-family="Arial, sans-serif" font-size="12" fill="#6a5a7a" text-anchor="middle" font-weight="600">Pontos Básicos</text>
  </g>

  <!-- Card slot 3 — top right -->
  <g transform="translate(402, 18)">
    <rect width="180" height="200" rx="14" fill="#c5ddc5" opacity="0.5"/>
    <!-- Simple dress icon -->
    <path d="M70 20 L50 60 L30 55 L40 100 L140 100 L150 55 L130 60 L110 20 Q90 30 70 20Z" fill="none" stroke="#5a8a5a" stroke-width="5" opacity="0.6" stroke-linejoin="round"/>
    <rect x="40" y="100" width="100" height="70" rx="5" fill="none" stroke="#5a8a5a" stroke-width="4" opacity="0.5"/>
    <text x="90" y="188" font-family="Arial, sans-serif" font-size="12" fill="#3a6a3a" text-anchor="middle" font-weight="600">Primeira Peça</text>
  </g>

  <!-- Card slot 4 — bottom left -->
  <g transform="translate(18, 232)">
    <rect width="270" height="200" rx="14" fill="#e0d0c0" opacity="0.5"/>
    <!-- Stars / progress -->
    <text x="135" y="100" font-family="Arial" font-size="60" fill="#c0a060" opacity="0.5" text-anchor="middle">★★★</text>
    <text x="135" y="160" font-family="Arial, sans-serif" font-size="14" fill="#8a6a30" text-anchor="middle" font-weight="600">Do Zero ao Avançado</text>
  </g>

  <!-- Card slot 5 — bottom right -->
  <g transform="translate(300, 232)">
    <rect width="282" height="200" rx="14" fill="#d0c8e8" opacity="0.5"/>
    <!-- Certificate icon -->
    <rect x="55" y="25" width="172" height="120" rx="10" fill="none" stroke="#7060a0" stroke-width="4" opacity="0.5"/>
    <line x1="80" y1="60" x2="202" y2="60" stroke="#7060a0" stroke-width="3" opacity="0.5"/>
    <line x1="80" y1="80" x2="202" y2="80" stroke="#7060a0" stroke-width="2" opacity="0.4"/>
    <line x1="80" y1="98" x2="160" y2="98" stroke="#7060a0" stroke-width="2" opacity="0.4"/>
    <path d="M141 130 L155 160 L141 153 L127 160 Z" fill="#c0a020" opacity="0.5"/>
    <text x="141" y="183" font-family="Arial, sans-serif" font-size="13" fill="#5040a0" text-anchor="middle" font-weight="600">Certificado</text>
  </g>

  <!-- Bottom label bar -->
  <rect x="0" y="420" width="600" height="30" fill="url(#accent)" opacity="0.85"/>
  <text x="300" y="440" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle" letter-spacing="2">MINI CURSO PARA INICIANTE · CROCHÊ DA JOSI</text>
</svg>
