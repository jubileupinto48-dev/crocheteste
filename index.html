    function isMobile() {
      const regex = /Mobi|Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i;
      return regex.test(navigator.userAgent);
    }

    function isPreviewOrLocal() {
      var host = window.location.hostname;
      return host === 'localhost' || host.includes('lovable.app') || host.includes('lovable.dev') || host.includes('lovableproject.com');
    }

    //validation js
    if (!isPreviewOrLocal()) {
      if (isMobile()) { console.log("Mobile device detected"); } else {
        window.location = url_link_redirect_pc;
      }
    }
